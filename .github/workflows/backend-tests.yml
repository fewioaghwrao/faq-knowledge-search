name: Backend Tests

on:
  push:
    branches:
      - main
      - feature/add-faq-app-initial
  pull_request:
    branches:
      - main
      - feature/add-faq-app-initial

jobs:
  backend-tests:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore FaqApp.Api.sln

      - name: Build
        run: dotnet build FaqApp.Api.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FaqApp.Api.sln --configuration Release --no-build --verbosity normal