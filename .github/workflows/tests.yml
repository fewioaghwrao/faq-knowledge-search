name: CI Tests

on:
  push:
    branches:
      - main
      - feature/add-faq-app-initial
  pull_request:
    branches:
      - main
      - feature/add-faq-app-initial

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: windows-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore FaqApp.Api.sln

      - name: Build
        run: dotnet build FaqApp.Api.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FaqApp.Api.sln --configuration Release --no-build --verbosity normal

  frontend-tests:
    name: Frontend Tests
    runs-on: windows-latest

    defaults:
      run:
        working-directory: faq-app-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: faq-app-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false